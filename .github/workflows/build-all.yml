name: Build Multi-Platform Executables

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: FTPClient_Fantuber_macOS
            asset_name: FTPClient_Fantuber_macOS
            separator: ":"
            extension: ""
          - os: windows-latest
            artifact_name: FTPClient_Fantuber_Windows.exe
            asset_name: FTPClient_Fantuber_Windows
            separator: ";"
            extension: ".exe"
          - os: ubuntu-latest
            artifact_name: FTPClient_Fantuber_Linux
            asset_name: FTPClient_Fantuber_Linux
            separator: ":"
            extension: ""
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install tkinterdnd2
      
      - name: Debug - Check files
        run: |
          echo "Archivos en el directorio:"
          ls -la
          echo "Verificando main.py:"
          if [ -f "main.py" ]; then echo "✅ main.py existe"; else echo "❌ main.py NO existe"; fi
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile \
            --windowed \
            --name "FTPClient_Fantuber${{ matrix.extension }}" \
            --clean \
            --add-data "README.md${{ matrix.separator }}." \
            main.py
        shell: ${{ matrix.os == 'windows-latest' && 'powershell' || 'bash' }}
      
      - name: Prepare package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p FTPClient_Package
          if [ -f "dist/FTPClient_Fantuber${{ matrix.extension }}" ]; then
            cp dist/FTPClient_Fantuber${{ matrix.extension }} FTPClient_Package/
            echo "✅ Ejecutable copiado"
          else
            echo "❌ Error: No se encontró el ejecutable"
            ls -la dist/
            exit 1
          fi
          cp README.md FTPClient_Package/ 2>/dev/null || echo "No README"
          cd FTPClient_Package
          zip -r ../${{ matrix.asset_name }}.zip *
        shell: bash
      
      - name: Prepare package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir FTPClient_Package -Force
          if (Test-Path "dist/FTPClient_Fantuber${{ matrix.extension }}") {
            Copy-Item "dist/FTPClient_Fantuber${{ matrix.extension }}" -Destination "FTPClient_Package/"
            Write-Host "✅ Ejecutable copiado"
          } else {
            Write-Host "❌ Error: No se encontró el ejecutable"
            Get-ChildItem dist/
            exit 1
          }
          if (Test-Path "README.md") { Copy-Item "README.md" -Destination "FTPClient_Package/" }
          Compress-Archive -Path "FTPClient_Package/*" -DestinationPath "${{ matrix.asset_name }}.zip" -Force
        shell: powershell
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: "${{ matrix.asset_name }}.zip"
      
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: "${{ matrix.asset_name }}.zip"
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
