name: Build macOS Binary - FTP Client

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.11']  # Solo usamos 3.11 que es más estable
      fail-fast: false  # No cancelar otros jobs si uno falla
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Instalar tkinterdnd2 específicamente
          pip install tkinterdnd2
      
      - name: Debug - List files
        run: |
          echo "Archivos en el repositorio:"
          ls -la
          echo "¿Existe main.py?"
          if [ -f "main.py" ]; then echo "✅ main.py existe"; else echo "❌ main.py NO existe"; fi
          echo "¿Existe ftp_manager.py?"
          if [ -f "ftp_manager.py" ]; then echo "✅ ftp_manager.py existe"; else echo "❌ ftp_manager.py NO existe"; fi
      
      - name: Test imports
        run: |
          python -c "import tkinter; print('✅ Tkinter OK')"
          python -c "from tkinterdnd2 import TkinterDnD; print('✅ TkinterDnD OK')"
          python -c "import ftplib; print('✅ ftplib OK')"
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile \
            --windowed \
            --name "FTPClient_Fantuber" \
            --clean \
            main.py
      
      - name: Prepare package
        run: |
          mkdir -p FTPClient_Package
          if [ -f "dist/FTPClient_Fantuber" ]; then
            cp dist/FTPClient_Fantuber FTPClient_Package/
          else
            echo "❌ Error: No se generó el ejecutable"
            ls -la dist/
            exit 1
          fi
          
          if [ -f "settings.ini" ]; then
            cp settings.ini FTPClient_Package/
          else
            echo "⚠️ settings.ini no encontrado"
          fi
          
          cat > FTPClient_Package/LEEME.txt << 'EOF'
          === CLIENTE FTP FANTUBER ===
          
          Archivos incluidos:
          - FTPClient_Fantuber : El programa principal
          - settings.ini       : Configuración con tus datos de FTP
          
          INSTRUCCIONES:
          1. Guarda todos los archivos en la misma carpeta
          2. Haz doble clic en FTPClient_Fantuber
          3. Si macOS muestra advertencia: 
             - Ve a Preferencias del Sistema → Seguridad y Privacidad
             - Haz clic en "Abrir de todas formas"
          
          Para editar la configuración, modifica settings.ini con un editor de texto.
          EOF
          
          zip -r FTPClient_Fantuber_macOS.zip FTPClient_Package/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FTPClient_Fantuber_macOS_Python${{ matrix.python-version }}
          path: FTPClient_Fantuber_macOS.zip
          retention-days: 30
